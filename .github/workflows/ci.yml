name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '*' ]

jobs:

  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        go: [ '1.24' ]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: fmt
        run: test -z $(gofmt -l . | head -n 1) || ( gofmt -d . ; exit 1 )

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./...

      - uses: dominikh/staticcheck-action@v1
        with:
          version: '2025.1.1'
          install-go: false
